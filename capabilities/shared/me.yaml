apiVersion: naftiko.dev/v1alpha1
kind: Capability
metadata:
  name: factorial-me
  labels:
    provider: factorial
    domain: hr
    resource: user
spec:
  title: Factorial Current User
  description: >-
    Identify the user behind an OAuth2 access token by reading the /v1/me
    endpoint. Useful immediately after token exchange.
  api:
    provider: factorial
    title: Factorial Core API
    openapi: ../../openapi/factorial-openapi.yml
    baseUrl: https://api.factorialhr.com/api
  auth:
    schemes:
      - oauth2
  operations:
    - id: getCurrentUser
      method: GET
      path: /v1/me
      summary: Get information about the current OAuth2 token holder.
